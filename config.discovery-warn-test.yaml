# Test configuration for discovery with warn on failure
# Should warn but continue with the test

target:
  url: "https://google.com/"
  method: "GET"

  discovery:
    enabled: true
    mode: validate
    ports: [443, 9999]  # 443 should work, 9999 should fail
    timeout_ms: 1000
    retries: 0
    on_failure: warn  # Should warn but continue
    detect_service: true
    validate_http: true

pattern:
  type: fixed
  concurrent: 1
  total_requests: 1

client:
  timeout_secs: 10

output:
  console: true
  realtime_updates: false
